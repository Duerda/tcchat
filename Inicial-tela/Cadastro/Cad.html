<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="Cad-Est.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="Telaprin">
        <div class="Card">
            <div class="logo"> <h1>T<span>CCHAT</span></h1></div>
            <div id="EnCad"> <button id="Entrar" onclick="Entrar()">Entrar</button>
            <button id="Cadastrar">Cadastrar</button></div>
            <form action="" method="get" >
            <div id="Nome">
                <label for="Nome-da-pessoa">Nome</label>
                <input id="Nome-da-pessoa" type="text"  placeholder="Seu nome completo" required  >
            </div>
            <div id="Email">
                <label for="Email-da-pessoa">E-mail</label>
                <input id="Email-da-pessoa" type="email"  placeholder="Aluno.16@Etec.sp.gov.br" required  >
            </div>
            <div class="Senha">
                <label for="Senha">Senha</label>
                <input id="Senha" type="password"  placeholder="Minimo de 8 digitos" required  >
            </div>
            <div id="Codigo">
                <label for="Codigo-da-pessoa">Código</label>
                <input id="Codigo-da-pessoa" type="text"  placeholder="Código fornecido pelo Coordenador"required  >
            </div>
            <div class="Senha">
                <label for="Repita-a-Senha">Repita a Senha</label>
                <input id="Repita-a-Senha" type="password"  placeholder="Repita a senha" required  >
            </div>
            <div id="Entrar-al">
                <input type="submit" value="Entrar" >
            </div>
            </Form>
        </div>
    </div>
</body>
<script src="Cad-back.js"></script>
</html>
